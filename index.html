<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지오메트리 핏 - 어드밴스드 (고등용)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script>
        MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] }, startup: { typeset: false } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ea; --neon-green: #39ff14; --bg-dark: #090a0f; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-dark); color: #ffffff; overflow: hidden; }
        h1, h2, h3, .orbitron { font-family: 'Orbitron', sans-serif; }
        .text-glow { text-shadow: 0 0 15px var(--neon-blue); }
        .text-glow-green { text-shadow: 0 0 15px var(--neon-green); }
        .text-glow-pink { text-shadow: 0 0 15px var(--neon-pink); }
        .btn-neon { background: rgba(0, 0, 0, 0.6); border: 2px solid var(--neon-blue); color: #ffffff; padding: 20px 40px; font-size: 1.5rem; font-weight: 700; transition: all 0.3s ease; border-radius: 12px; }
        .btn-neon:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 25px var(--neon-blue); }
        .glass-panel { background: rgba(10, 15, 30, 0.9); border: 1px solid rgba(0, 243, 255, 0.5); backdrop-filter: blur(15px); border-radius: 20px; }
        .hidden-screen { display: none !important; }
        .input_video { display: none; }
        .output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.8; }
        .reading-text { font-size: 1.35rem; line-height: 1.8; color: #e2e8f0; }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative">
    <div id="screen-home" class="absolute inset-0 z-10 flex flex-col items-center justify-center p-8">
        <h1 class="text-7xl font-black mb-4 tracking-widest text-glow text-center">GEOMETRY FIT</h1>
        <h2 class="text-4xl text-pink-500 mb-16 tracking-widest font-bold text-glow-pink">ADVANCED PROTOCOL</h2>
        <div class="grid grid-cols-2 gap-8 w-full max-w-5xl">
            <button onclick="startGame()" class="btn-neon col-span-2 !border-green-400 !text-green-400 text-3xl py-6">INIT SEQUENCE : 게임 시작</button>
            <button onclick="showMenu()" class="btn-neon">MATH THEORY</button>
            <button onclick="showRanking()" class="btn-neon">DATA ARCHIVE</button>
        </div>
    </div>

    <!-- 수학 자료 및 게임 로직은 기존 코드와 동일한 구조로 유지 -->
    <!-- (중략: 전체 코드를 붙여넣으세요) -->
    
    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxPeuoVLQbKwNdDZjHWrPI0UP0DgXVyNJS7EJHVHTKFD3IKLV4Q34uGHOrvR0cM58rPRw/exec";

        function saveRecord() {
            const name = document.getElementById('player-name').value.trim() || "UNKNOWN PILOT";
            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ name: name, formattedStr: formatTime(finalTimeMs), timeMs: finalTimeMs }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            }).then(() => alert("저장 성공")).catch(() => alert("저장 실패"));
            returnToHome();
        }

        async function showRanking() {
            document.getElementById('screen-rank').classList.remove('hidden-screen');
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            document.getElementById('ranking-list').innerHTML = data.map((r, i) => `<div>#${i+1} ${r.name} - ${r.formattedStr}</div>`).join('');
        }
    </script>
</body>
</html>
